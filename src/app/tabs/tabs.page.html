  <button
    type="button"
    class="desktop-floating-toggle"
    (click)="toggleSidebar()"
    [attr.aria-expanded]="!sidebarCollapsed"
    aria-label="Toggle menu"
  >
    <ion-icon [name]="sidebarCollapsed ? 'menu-outline' : 'menu-sharp'"></ion-icon>
  </button>

  <aside class="desktop-sidebar" [class.is-collapsed]="sidebarCollapsed">
    <div class="desktop-sidebar-head">
      <div class="desktop-sidebar-brand" *ngIf="!sidebarCollapsed">
        <div class="brand-kicker">Market</div>
        <div class="brand-title">Workspace</div>
      </div>
    </div>

    <nav class="desktop-sidebar-nav">
      <ng-container *ngFor="let item of menuItems">
        <a
          *ngIf="can(item.permission)"
          class="desktop-nav-link"
          [routerLink]="item.href"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          [attr.aria-label]="item.labelKey | translate"
        >
          <span class="desktop-nav-icon">
            <ion-icon [name]="item.icon"></ion-icon>
          </span>
          <span class="desktop-nav-label" *ngIf="!sidebarCollapsed">{{ item.labelKey | translate }}</span>
        </a>
      </ng-container>
    </nav>
  </aside>

  <div class="tabs-stage">
    <ion-tabs class="tabs-host">
      <ion-tab-bar slot="bottom" class="mobile-tab-bar">
        <ion-tab-button *ngIf="can('dashboard.view')" tab="dashboard-v2" href="/tabs/dashboard-v2">
          <ion-icon aria-hidden="true" name="grid-outline"></ion-icon>
          <ion-label>{{ 'tabs.dashboardV2' | translate }}</ion-label>
        </ion-tab-button>

        <ion-tab-button *ngIf="canViewStrategy" tab="strategy-hub" href="/tabs/strategy-hub">
          <ion-icon name="layers-outline"></ion-icon>
          <ion-label>{{ 'tabs.strategy' | translate }}</ion-label>
        </ion-tab-button>

        <ion-tab-button *ngIf="can('market-settings.view')" tab="market-settings" href="/tabs/market-settings">
          <ion-icon name="settings-outline"></ion-icon>
          <ion-label>{{ 'tabs.settings' | translate }}</ion-label>
        </ion-tab-button>
      </ion-tab-bar>
    </ion-tabs>
  </div>
</div>
