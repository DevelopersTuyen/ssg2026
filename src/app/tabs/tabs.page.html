<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="dashboard" href="/tabs/dashboard">
      <ion-icon aria-hidden="true" name="grid-outline"></ion-icon>
      <ion-label>Dashboard</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="market-watch" href="/tabs/market-watch">
      <ion-icon name="stats-chart-outline"></ion-icon>
      <ion-label>Market</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="market-alerts" href="/tabs/market-alerts">
      <ion-icon name="notifications-outline"></ion-icon>
      <ion-label>Cảnh báo</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="ai-agent" href="/tabs/ai-agent">
      <ion-icon name="sparkles-outline"></ion-icon>
      <ion-label>AI Agent</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="ai-local" href="/tabs/ai-local">
      <ion-icon name="hardware-chip-outline"></ion-icon>
      <ion-label>AI Local</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="market-settings" href="/tabs/market-settings">
      <ion-icon name="settings-outline"></ion-icon>
      <ion-label>Cài đặt</ion-label>
    </ion-tab-button>

    <ion-tab-button
      *ngIf="canViewPermissions"
      tab="role-permissions"
      href="/tabs/role-permissions"
    >
      <ion-icon name="shield-checkmark-outline"></ion-icon>
      <ion-label>Phân quyền</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
