  <aside
    class="desktop-sidebar"
    [class.is-collapsed]="sidebarCollapsed"
    [style.width.px]="sidebarWidth"
    [style.flex-basis.px]="sidebarWidth"
  >
    <div class="desktop-sidebar-head">
      <div class="desktop-sidebar-brand-wrap">
        <div class="desktop-sidebar-brand" [class.is-hidden]="sidebarCollapsed">
          <div class="brand-kicker">Market</div>
          <div class="brand-title">Workspace</div>
        </div>
      </div>

      <button
        type="button"
        class="desktop-sidebar-toggle"
        (click)="toggleSidebar()"
        [attr.aria-expanded]="!sidebarCollapsed"
        [attr.aria-label]="sidebarCollapsed ? 'Expand menu' : 'Collapse menu'"
      >
        <ion-icon [name]="sidebarCollapsed ? 'chevron-forward-outline' : 'chevron-back-outline'"></ion-icon>
      </button>
    </div>

    <div class="desktop-sidebar-divider"></div>

    <nav class="desktop-sidebar-nav">
      <div class="desktop-nav-group-label" [class.is-hidden]="sidebarCollapsed">Navigation</div>

      <ng-container *ngFor="let item of menuItems">
        <a
          *ngIf="can(item.permission)"
          class="desktop-nav-link"
          [routerLink]="item.href"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          [attr.aria-label]="item.labelKey | translate"
          [attr.title]="sidebarCollapsed ? (item.labelKey | translate) : null"
        >
          <span class="desktop-nav-icon">
            <ion-icon [name]="item.icon"></ion-icon>
          </span>
          <span class="desktop-nav-label" [class.is-hidden]="sidebarCollapsed">{{ item.labelKey | translate }}</span>
        </a>
      </ng-container>
    </nav>

    <div class="desktop-sidebar-spacer"></div>

    <div class="desktop-sidebar-footer" [class.is-collapsed]="sidebarCollapsed">
      <button
        type="button"
        class="desktop-sidebar-logout"
        (click)="logout()"
        [attr.aria-label]="'common.logout' | translate"
        [attr.title]="sidebarCollapsed ? (('common.logout' | translate)) : null"
      >
        <span class="desktop-sidebar-status-dot"></span>
        <span class="desktop-sidebar-status-copy" [class.is-hidden]="sidebarCollapsed">
          <strong>{{ 'common.logout' | translate }}</strong>
          <span>End current session</span>
        </span>
      </button>
    </div>
  </aside>

  <div class="tabs-stage">
    <header class="mobile-topbar">
      <button
        type="button"
        class="mobile-topbar-toggle"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="mobileMenuOpen"
        aria-label="Open mobile menu"
      >
        <ion-icon [name]="mobileMenuOpen ? 'close-outline' : 'menu-outline'"></ion-icon>
      </button>
      <div class="mobile-topbar-brand">
        <div class="brand-kicker">Market</div>
        <div class="brand-title">Workspace</div>
      </div>
    </header>

    <div class="mobile-menu-backdrop" *ngIf="mobileMenuOpen" (click)="closeMobileMenu()"></div>
    <aside class="mobile-menu-panel" [class.is-open]="mobileMenuOpen">
      <nav class="mobile-menu-nav">
        <ng-container *ngFor="let item of menuItems">
          <a
            *ngIf="can(item.permission)"
            class="mobile-menu-link"
            [routerLink]="item.href"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeMobileMenu()"
          >
            <span class="mobile-menu-icon">
              <ion-icon [name]="item.icon"></ion-icon>
            </span>
            <span class="mobile-menu-label">{{ item.labelKey | translate }}</span>
          </a>
        </ng-container>
      </nav>

      <button type="button" class="mobile-menu-logout" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
        <span>{{ 'common.logout' | translate }}</span>
      </button>
    </aside>

    <div class="tabs-content-shell">
      <ion-router-outlet class="tabs-router-outlet"></ion-router-outlet>
    </div>

    <nav class="mobile-tab-bar" aria-label="Mobile navigation">
      <a
        *ngIf="can('dashboard.view')"
        class="mobile-tab-link"
        routerLink="/tabs/dashboard-v2"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <ion-icon aria-hidden="true" name="grid-outline"></ion-icon>
        <span>{{ 'tabs.dashboardV2' | translate }}</span>
      </a>

      <a
        *ngIf="canViewStrategy"
        class="mobile-tab-link"
        routerLink="/tabs/strategy-hub"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <ion-icon name="layers-outline"></ion-icon>
        <span>{{ 'tabs.strategy' | translate }}</span>
      </a>

      <a
        *ngIf="can('market-settings.view')"
        class="mobile-tab-link"
        routerLink="/tabs/market-settings"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <ion-icon name="settings-outline"></ion-icon>
        <span>{{ 'tabs.settings' | translate }}</span>
      </a>

      <button type="button" class="mobile-tab-link mobile-logout-link" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
        <span>{{ 'common.logout' | translate }}</span>
      </button>
    </nav>
  </div>
</div>
